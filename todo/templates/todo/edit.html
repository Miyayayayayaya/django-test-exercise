{% load static %}
<!DOCTYPE html>
<html lang="ja" style="--theme-hue: {{ theme_hue }};">

<head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/styles.css' %}">
</head>

<body>
    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
    <form action="{% url 'update' task.id %}" method="post">
        {% csrf_token %}
        <div>
            <label for="titleInput">Title</label><br>
            <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
        </div>
        <div>
            <label for="dueInput">Due at:</label><br>
            <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:" Y-m-d H:i" }}">
        </div>
        <div>
            <label for="ratingInput">Rating</label><br>
            <select id="ratingInput" name="rating">
                <option value="0" {% if task.rating==0 %}selected{% endif %}>未評価</option>
                <option value="1" {% if task.rating==1 %}selected{% endif %}>★☆☆☆☆</option>
                <option value="2" {% if task.rating==2 %}selected{% endif %}>★★☆☆☆</option>
                <option value="3" {% if task.rating==3 %}selected{% endif %}>★★★☆☆</option>
                <option value="4" {% if task.rating==4 %}selected{% endif %}>★★★★☆</option>
                <option value="5" {% if task.rating==5 %}selected{% endif %}>★★★★★</option>
            </select>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
    <br>
    <div>
        <a href="{% url 'index' %}">Top</a>
        <a href="{% url 'settings' %}">Settings</a>
    </div>
</body>

</html>
